let _captchaResult, _captchaSolved=!1;
function _generateCaptcha(){const _a=Math.floor(Math.random()*20)+1,_b=Math.floor(Math.random()*20)+1;_captchaResult=_a+_b;document.getElementById('captchaExpression').textContent=_a+' + '+_b+' = ?';}

const _0xProx=['https://api.allorigins.win/raw?url=','https://corsproxy.io/?','https://api.codetabs.com/v1/proxy/?quest='];
let _avatarGlobal='';

function _sanitize(str){const _div=document.createElement('div');_div.textContent=str;return _div.innerHTML;}
function _extractUser(input){let _clean=input.trim().replace(/^@/,'');const _patterns=[/tiktok\.com\/@([a-zA-Z0-9_.]+)/,/@([a-zA-Z0-9_.]+)/];for(let _p of _patterns){const _m=_clean.match(_p);if(_m)return _m[1];}return _clean.replace(/[^a-zA-Z0-9_.]/g,'');}

function _toggleLoader(_show){document.getElementById('loader').style.display=_show?'block':'none';}
function _toggleResult(_show){document.getElementById('result').style.display=_show?'block':'none';}

async function _fetchTikTokData(_query){
    const _username=_extractUser(_query);
    if(!_username)throw new Error('اسم المستخدم غير صحيح');
    const _url=`https://www.tiktok.com/@${_username}`;
    for(let _proxy of _0xProx){
        try{
            const _ctrl=new AbortController();setTimeout(()=>_ctrl.abort(),12000);
            const _resp=await fetch(_proxy+encodeURIComponent(_url),{signal:_ctrl.signal});
            if(_resp.ok){
                const _html=await _resp.text();
                if(_html.includes('__UNIVERSAL_DATA_FOR_REHYDRATION__'))return _html;
            }
        }catch(_err){continue;}
    }
    throw new Error('تعذر الاتصال بـ TikTok');
}

function _parseProfile(_html){
    const _match=_html.match(/<script id="__UNIVERSAL_DATA_FOR_REHYDRATION__"[^>]*>(.*?)<\/script>/);
    if(!_match)throw new Error('الحساب غير موجود');
    const _json=JSON.parse(_match[1]);
    const _detail=_json.__DEFAULT_SCOPE__?.['webapp.user-detail'];
    if(!_detail?.userInfo)throw new Error('أكو مشكلة');
    const _u=_detail.userInfo.user,_s=_detail.userInfo.stats;
    _avatarGlobal=_u.avatarLarger||_u.avatarMedium||_u.avatarThumb||'';
    const _fmt=(_ts)=>_ts?new Date(_ts*1000).toLocaleString('ar-IQ',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:!1}):null;
    const _code=(_u.region||_u.country||'').toUpperCase();
    const _langCode=(_u.language||_u.lang||'').toLowerCase();
    return{
        username:_u.uniqueId,userId:_u.id||_u.uid,name:_u.nickname||_u.uniqueId,bio:_u.signature,
        verified:_u.verified,private:_u.privateAccount,
        followers:_s.followerCount,following:_s.followingCount,likes:_s.heartCount||_s.diggCount,videos:_s.videoCount,
        created:_fmt(_u.createTime),usernameMod:_fmt(_u.uniqueIdModifyTime),nameMod:_fmt(_u.nickNameModifyTime),
        countryCode:_code,
        region:_countriesMap[_code]||_u.region||'ممعروف',
        language:_languagesMap[_langCode]||_u.language||_u.lang||'ممعروف',
        showFollowers:_u.showFollowing?'للجميع':'الأصدقاء',
        duet:_u.duetSetting===0?'للجميع':(_u.duetSetting===1?'الأصدقاء':'معطل'),
        comments:_u.commentSetting===0?'للجميع':(_u.commentSetting===1?'الأصدقاء':'ما مشتغل')
    };
}

function _formatNumber(_n){return _n>=1e6?(_n/1e6).toFixed(1)+'M':_n>=1e3?(_n/1e3).toFixed(1)+'K':_n?.toString()||'0';}

async function _0x1a2b3c(){
    if(!_captchaSolved){alert('يرجى إكمال التحقق الأمني أولاً!');return;}
    const _q=document.getElementById('query').value.trim();
    if(!_q)return alert('يرجى إدخال اسم المستخدم');
    _toggleLoader(!0);_toggleResult(!1);
    try{
        const _html=await _fetchTikTokData(_q);
        _renderProfile(_parseProfile(_html));
        _toggleResult(!0);
    }catch(_e){alert('❌ '+_e.message);}
    finally{_toggleLoader(!1);}
}

window.downloadAvatar=async function(){
    if(!_avatarGlobal)return alert('لا توجد صورة للمستخدم');
    try{
        const _r=await fetch(_avatarGlobal);const _b=await _r.blob();
        const _a=document.createElement('a');_a.href=URL.createObjectURL(_b);
        _a.download=`avatar_${Date.now()}.jpg`;_a.click();URL.revokeObjectURL(_a.href);
    }catch(_e){window.open(_avatarGlobal);}
};
