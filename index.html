<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rio • TikTok</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #E0F2FF 0%, #FFFFFF 60%);
            background-attachment: fixed; color: #2C3E50; min-height: 100vh;
            display: flex; justify-content: center; padding: 16px; position: relative; overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 200%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300"><ellipse cx="80" cy="150" rx="60" ry="30" fill="white" opacity="0.9"/><ellipse cx="140" cy="135" rx="80" ry="40" fill="white" opacity="0.85"/><ellipse cx="250" cy="180" rx="70" ry="35" fill="white" opacity="0.8"/><ellipse cx="380" cy="140" rx="90" ry="38" fill="white" opacity="0.85"/><ellipse cx="500" cy="190" rx="75" ry="42" fill="white" opacity="0.75"/><ellipse cx="650" cy="150" rx="85" ry="40" fill="white" opacity="0.8"/><ellipse cx="800" cy="175" rx="65" ry="35" fill="white" opacity="0.85"/><ellipse cx="920" cy="135" rx="100" ry="45" fill="white" opacity="0.7"/></svg>') repeat-x;
            background-size: 50% auto;
            pointer-events: none;
            z-index: 0;
            animation: moveClouds 35s linear infinite;
            top: 40px;
        }
        @keyframes moveClouds {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .app { max-width: 500px; width: 100%; position: relative; z-index: 1; }
        /* تنبيه Toast */
        .toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(30,55,153,0.9); color: white;
            padding: 12px 20px 12px 16px;
            border-radius: 40px;
            z-index: 10000; display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2), 0 0 0 3px rgba(255,215,0,0.4);
            font-weight: 500; font-size: 0.95rem;
        }
        .toast-icon {
            width: 36px; height: 36px;
            background: url('https://i.postimg.cc/L8Zv8L8x/1777748175462.png') center/contain no-repeat;
            flex-shrink: 0;
        }
        .toast-text { flex: 1; }
        /* الكابتشا */
        .captcha-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .captcha-box {
            background: #FFFFFF; border-radius: 48px; padding: 30px 20px;
            text-align: center; max-width: 360px; width: 90%;
            box-shadow: 0 20px 40px rgba(0,100,148,0.15); border: 2px solid #7EC8E3;
        }
        .captcha-box .doraemon-icon {
            width: 100px; height: 100px;
            background: url('https://i.postimg.cc/L8Zv8L8x/1777748175462.png') center/contain no-repeat;
            margin: 0 auto 16px;
        }
        .captcha-box h2 { font-size: 1.6rem; font-weight: 600; color: #1E3799; }
        .captcha-box p { color: #4A69BD; font-size: 0.95rem; margin-bottom: 16px; }
        .captcha-math {
            font-size: 2rem; font-weight: 700; color: #E55039;
            background: #FFF3E0; padding: 8px 22px; border-radius: 30px;
            display: inline-block; letter-spacing: 3px;
        }
        .captcha-input {
            width: 80px; padding: 12px; text-align: center;
            border: 2px solid #7EC8E3; border-radius: 25px;
            font-size: 1.2rem; font-weight: 600; outline: none;
            margin-top: 16px; background: #F8FCFF;
        }
        .captcha-input:focus { border-color: #4B9CD3; }
        .captcha-btn {
            margin-top: 18px; padding: 12px 28px;
            background: #4B9CD3; color: white; border: none;
            border-radius: 30px; font-weight: 600; cursor: pointer;
            box-shadow: 0 8px 15px rgba(75,156,211,0.3);
        }
        /* الهيدر */
        .header { text-align: center; padding: 10px 0 20px; }
        .header .doraemon-logo {
            width: 90px; height: 90px;
            background: url('https://i.postimg.cc/L8Zv8L8x/1777748175462.png') center/contain no-repeat;
            margin: 0 auto;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));
        }
        .header h1 { font-size: 2.5rem; font-weight: 700; color: #1E3799; text-shadow: 2px 2px 0 #FFD700; margin-top: 8px; }
        .header .subtitle { color: #4A69BD; font-weight: 500; }
        /* باقي التنسيقات */
        .search-box {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(15px);
            border-radius: 36px; padding: 20px; margin: 20px 0;
            border: 2px solid #A8D8EA; box-shadow: 0 12px 25px rgba(0,150,200,0.1);
        }
        .search-input {
            width: 100%; background: #F8FCFF; border: 2px solid #C5E5F5;
            border-radius: 28px; padding: 14px 20px; font-size: 1rem;
            outline: none; margin-bottom: 14px; color: #2C3E50; font-weight: 500; transition: 0.2s;
        }
        .search-input:focus { border-color: #4B9CD3; }
        .search-input::placeholder { color: #A0C4D9; }
        .search-btn {
            width: 100%; background: #4B9CD3; color: white; border: none;
            padding: 14px; border-radius: 28px; font-weight: 600; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 6px 15px rgba(75,156,211,0.3); cursor: pointer;
        }
        .hint { font-size: 0.7rem; color: #6C8EB2; text-align: center; margin-top: 12px; }
        .loader {
            display: none; text-align: center; padding: 30px;
            background: rgba(255,255,255,0.7); border-radius: 36px;
            border: 2px solid #A8D8EA; margin-bottom: 20px;
        }
        .loader .spinner {
            width: 40px; height: 40px; margin: 0 auto 10px;
            border: 3px solid #E0F2FF; border-top-color: #4B9CD3;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .result-card {
            background: rgba(255,255,255,0.85); backdrop-filter: blur(15px);
            border-radius: 40px; padding: 25px 20px; margin-bottom: 20px;
            border: 2px solid #A8D8EA; box-shadow: 0 15px 30px rgba(0,120,180,0.08);
            display: none;
        }
        .error-card {
            background: rgba(255,240,240,0.9); backdrop-filter: blur(15px);
            border-radius: 36px; padding: 20px; margin-bottom: 20px;
            border: 2px solid #FFB3B3; text-align: center; color: #C0392B; display: none;
        }
        .profile { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; }
        .avatar-ring {
            width: 85px; height: 85px; border-radius: 50%; padding: 3px;
            background: linear-gradient(145deg, #4B9CD3, #FFD700); flex-shrink: 0; cursor: pointer;
        }
        .avatar-inner {
            width: 100%; height: 100%; border-radius: 50%; background: white;
            display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
        }
        .avatar-inner img { width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; }
        .avatar-fallback { font-size: 38px; font-weight: 700; color: #4B9CD3; }
        .name { font-size: 1.5rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .verified-icon { width: 22px; height: 22px; fill: #1DA1F2; }
        .username { color: #5A7A9A; font-weight: 500; font-size: 0.9rem; }
        .stats {
            display: grid; grid-template-columns: repeat(4,1fr); gap: 8px;
            background: #F0F8FF; border-radius: 24px; padding: 16px 4px;
            margin-bottom: 20px; border: 1px solid #D4E8F5;
        }
        .stat-item { text-align: center; } .stat-num { font-weight: 600; font-size: 1.3rem; color: #1E3799; } .stat-lbl { font-size: 0.7rem; color: #5A7A9A; }
        .id-row {
            background: #F0F8FF; border-radius: 18px; padding: 14px 18px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; border: 1px solid #D4E8F5;
        }
        .id-row span:first-child { color: #5A7A9A; font-weight: 500; } .id-row span:last-child { font-family: monospace; color: #E55039; direction:ltr; font-weight: 600; }
        .copy-btn {
            background: #E55039; color: white; border: none; padding: 10px 20px;
            border-radius: 22px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 18px;
            box-shadow: 0 5px 12px rgba(229,80,57,0.3);
        }
        .bio {
            background: #F0F8FF; border-radius: 18px; padding: 14px 18px; margin-bottom: 18px; color: #2C3E50; border: 1px solid #D4E8F5; line-height: 1.5; font-weight: 400;
        }
        .section { margin-bottom: 22px; }
        .section-title { font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; color: #1E3799; font-size: 0.95rem; }
        .detail { display: flex; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid #E8F2FA; }
        .detail:last-child { border-bottom: none; } .detail-lbl { color: #5A7A9A; font-weight: 500; } .detail-val { font-weight: 600; color: #2C3E50; direction: ltr; }
        .badge { padding: 5px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; } .badge-yes { background: #FFE0E0; color: #E55039; } .badge-no { background: #E8F2FA; color: #6C8EB2; }
        .download-btn {
            width: 100%; background: #FFD700; color: #1E3799; border: none; padding: 15px; border-radius: 26px; font-weight: 600; font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; margin-bottom: 16px; box-shadow: 0 8px 15px rgba(255,215,0,0.3);
        }
        .footer { text-align: center; padding: 20px; color: #A0C4D9; font-weight: 500; font-size: 0.7rem; }
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .modal-img { max-width: 95%; max-height: 95%; border-radius: 28px; cursor: pointer; }
    </style>
</head>
<body>

<div id="toastContainer"></div>

<div class="captcha-overlay" id="captchaOverlay">
    <div class="captcha-box">
        <div class="doraemon-icon"></div>
        <h2>حماية رياضية</h2>
        <p>حل المسألة البسيطة للمتابعة</p>
        <div class="captcha-math" id="captchaExpression"></div>
        <br>
        <input type="number" class="captcha-input" id="captchaAnswer" placeholder="?">
        <br>
        <button class="captcha-btn" onclick="verifyCaptcha()">دخول</button>
    </div>
</div>

<div class="app" id="mainApp" style="display:none;">
    <div class="header">
        <div class="doraemon-logo"></div>
        <h1>Rio</h1>
        <p class="subtitle">الموقع الأول بالعالم · تحت التجربة BETA</p>
    </div>

    <div class="search-box">
        <input type="text" class="search-input" id="query" placeholder="اسم المستخدم أو الرابط..." dir="ltr">
        <button class="search-btn" onclick="searchTikTok()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15" y2="15"/></svg>
            بحث
        </button>
        <div class="hint">@username أو tiktok.com/@username</div>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="color:#5A7A9A;">درايمون يبحث...</p>
    </div>

    <div class="error-card" id="errorCard">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#E55039" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p id="errorMessage" style="margin-top:12px;"></p>
    </div>

    <div class="result-card" id="result"></div>
    <div class="footer">كـ تجربة · Rio · 2026</div>
</div>

<div id="modal" class="modal-overlay" onclick="this.style.display='none'">
    <img id="modalImage" class="modal-img" src="" alt="صورة كبيرة" onclick="event.stopPropagation()">
</div>

<script>
    // ===== نظام Toast مع أيقونة =====
    function showToast(msg, duration = 2500) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `
            <div class="toast-icon"></div>
            <span class="toast-text">${msg}</span>
        `;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, duration);
    }

    // ===== كابتشا =====
    let captchaResult, captchaSolved = false;
    function generateCaptcha(){
        const a = Math.floor(Math.random()*12)+1, b = Math.floor(Math.random()*12)+1;
        captchaResult = a + b;
        document.getElementById('captchaExpression').textContent = a + ' + ' + b + ' = ?';
    }
    generateCaptcha();
    window.verifyCaptcha = function(){
        const ans = parseInt(document.getElementById('captchaAnswer').value);
        if(ans === captchaResult){
            captchaSolved = true;
            document.getElementById('captchaOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            showToast('تم التحقق · أهلاً بك!');
        } else {
            showToast('إجابة خاطئة · حاول مجدداً');
            generateCaptcha();
            document.getElementById('captchaAnswer').value = '';
        }
    };

    // ===== البيانات =====
    const CORS_PROXIES = [
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?',
        'https://api.codetabs.com/v1/proxy/?quest=',
        ''
    ];
    let avatarGlobal = '';

    const countriesMap = {
        'IQ':'🇮🇶 العراق','SA':'🇸🇦 السعودية','AE':'🇦🇪 الإمارات','EG':'🇪🇬 مصر','US':'🇺🇸 الولايات المتحدة','GB':'🇬🇧 المملكة المتحدة',
        'FR':'🇫🇷 فرنسا','DE':'🇩🇪 ألمانيا','JP':'🇯🇵 اليابان','CN':'🇨🇳 الصين','IN':'🇮🇳 الهند','BR':'🇧🇷 البرازيل'
    };
    const languagesMap = {
        'ara':'العربية','eng':'الإنجليزية','fra':'الفرنسية','deu':'الألمانية','jpn':'اليابانية','zho':'الصينية',
        'hin':'الهندية','por':'البرتغالية','spa':'الإسبانية','rus':'الروسية','tur':'التركية','kor':'الكورية'
    };

    function sanitize(str){ const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
    function formatTime(ts){ return ts ? new Date(ts*1000).toLocaleString('ar-IQ',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:!1}) : 'غير متوفر'; }
    function formatNum(n){ return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':n?.toString()||'0'; }

    function toggleLoader(show) { document.getElementById('loader').style.display = show ? 'block' : 'none'; }
    function toggleResult(show) { document.getElementById('result').style.display = show ? 'block' : 'none'; }
    function toggleError(show, msg) {
        const el = document.getElementById('errorCard');
        el.style.display = show ? 'block' : 'none';
        if(msg) document.getElementById('errorMessage').textContent = msg;
    }

    function extractUsername(input){
        let clean = input.trim();
        if(clean.includes('vm.tiktok.com')) return {type:'shortlink', url:clean};
        if(clean.includes('tiktok.com/@')){
            const m = clean.match(/tiktok\.com\/@([a-zA-Z0-9_.]+)/);
            return m ? {type:'username', value:m[1]} : null;
        }
        if(clean.startsWith('@')) return {type:'username', value:clean.substring(1)};
        return {type:'username', value:clean.replace(/[^a-zA-Z0-9_.]/g,'')};
    }

    async function resolveShortLink(url){
        try {
            const resp = await fetch(url, {method:'HEAD', redirect:'follow'});
            const m = resp.url.match(/tiktok\.com\/@([a-zA-Z0-9_.]+)/);
            return m ? m[1] : null;
        } catch(e) { return null; }
    }

    async function fetchTikTokData(rawInput){
        const ext = extractUsername(rawInput);
        if(!ext) throw new Error('الرجاء إدخال معرف صحيح');
        
        let username;
        if(ext.type === 'shortlink') {
            username = await resolveShortLink(ext.url);
            if(!username) throw new Error('فشل فك الرابط المختصر');
        } else {
            username = ext.value;
        }
        if(!username) throw new Error('اسم المستخدم غير صحيح');
        
        const url = `https://www.tiktok.com/@${username}`;
        
        for(let proxy of CORS_PROXIES){
            try{
                const ctrl = new AbortController(); 
                setTimeout(() => ctrl.abort(), 10000);
                const fetchUrl = proxy ? proxy + encodeURIComponent(url) : url;
                const resp = await fetch(fetchUrl, {signal: ctrl.signal});
                if(resp.ok){
                    const html = await resp.text();
                    if(html.includes('__UNIVERSAL_DATA_FOR_REHYDRATION__')) return html;
                }
            } catch(e) {
                continue;
            }
        }
        throw new Error('تعذر الاتصال بـ TikTok. قد يكون الحساب خاصاً أو محذوفاً.');
    }

    function parseProfile(html){
        const match = html.match(/<script id="__UNIVERSAL_DATA_FOR_REHYDRATION__"[^>]*>(.*?)<\/script>/);
        if(!match) throw new Error('الحساب غير موجود');
        const json = JSON.parse(match[1]);
        const detail = json.__DEFAULT_SCOPE__?.['webapp.user-detail'];
        if(!detail?.userInfo) throw new Error('تعذر استخراج البيانات');
        
        const u = detail.userInfo.user, s = detail.userInfo.stats;
        avatarGlobal = u.avatarLarger || u.avatarMedium || u.avatarThumb || '';
        const countryCode = (u.region||u.country||'').toUpperCase();
        const langCode = (u.language||u.lang||'').toLowerCase();
        const device = u.deviceType === 1 ? 'آيفون' : (u.deviceType === 2 ? 'أندرويد' : (u.os?.includes('iOS')?'آيفون':u.os?.includes('Android')?'أندرويد':'غير معروف'));

        return {
            username: u.uniqueId, userId: u.id||u.uid, name: u.nickname||u.uniqueId, bio: u.signature,
            verified: u.verified, private: u.privateAccount,
            followers: s.followerCount, following: s.followingCount, likes: s.heartCount||s.diggCount, videos: s.videoCount,
            created: formatTime(u.createTime), usernameMod: formatTime(u.uniqueIdModifyTime), nameMod: formatTime(u.nickNameModifyTime),
            region: countriesMap[countryCode] || u.region || 'غير محدد',
            language: languagesMap[langCode] || u.language || u.lang || 'غير محدد',
            showFollowers: u.showFollowing?'للجميع':'الأصدقاء',
            duet: u.duetSetting===0?'للجميع':(u.duetSetting===1?'الأصدقاء':'معطل'),
            comments: u.commentSetting===0?'للجميع':(u.commentSetting===1?'الأصدقاء':'معطل'),
            deviceType: device, lastLogin: formatTime(u.lastLoginTime), avatarChange: formatTime(u.avatarModifyTime),
            dmCount: u.dmCount || u.conversationCount || 0
        };
    }

    function renderProfile(d){
        const v = d.verified ? '<svg class="verified-icon" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>' : '';
        const avatarHTML = avatarGlobal
            ? `<img src="${sanitize(avatarGlobal)}" onerror="this.onerror=null; this.style.display='none'; this.parentElement.querySelector('.avatar-fallback').style.display='flex';" alt=""><span class="avatar-fallback" style="display:none;">${sanitize(d.name.charAt(0))}</span>`
            : `<span class="avatar-fallback">${sanitize(d.name.charAt(0))}</span>`;
        const bio = d.bio ? sanitize(d.bio).substring(0,200) : '';
        
        const html = `
            <div class="profile">
                <div class="avatar-ring" onclick="viewAvatar()"><div class="avatar-inner">${avatarHTML}</div></div>
                <div><div class="name">${sanitize(d.name)} ${v}</div><div class="username">@${sanitize(d.username)}</div></div>
            </div>
            <div class="stats">
                <div class="stat-item"><div class="stat-num">${formatNum(d.followers)}</div><div class="stat-lbl">متابعين</div></div>
                <div class="stat-item"><div class="stat-num">${formatNum(d.following)}</div><div class="stat-lbl">يتابع</div></div>
                <div class="stat-item"><div class="stat-num">${formatNum(d.likes)}</div><div class="stat-lbl">إعجابات</div></div>
                <div class="stat-item"><div class="stat-num">${d.videos}</div><div class="stat-lbl">فيديوهات</div></div>
            </div>
            <div class="id-row"><span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/></svg> ID</span><span>${sanitize(d.userId)}</span></div>
            <button class="copy-btn" onclick="copyID('${sanitize(d.userId)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> نسخ</button>
            ${bio ? `<div class="bio">${bio}</div>` : ''}
            <button class="download-btn" onclick="downloadAvatar()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v13m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg> تحميل الصورة</button>
            <div class="section">
                <div class="section-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg> التواريخ</div>
                <div class="detail"><span class="detail-lbl">الإنشاء</span><span class="detail-val">${d.created}</span></div>
                <div class="detail"><span class="detail-lbl">تعديل اليوزر</span><span class="detail-val">${d.usernameMod}</span></div>
                <div class="detail"><span class="detail-lbl">تعديل الاسم</span><span class="detail-val">${d.nameMod}</span></div>
                <div class="detail"><span class="detail-lbl">آخر دخول</span><span class="detail-val">${d.lastLogin}</span></div>
                <div class="detail"><span class="detail-lbl">تغيير الصورة</span><span class="detail-val">${d.avatarChange}</span></div>
            </div>
            <div class="section">
                <div class="section-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2C7.58 2 4 5.58 4 10c0 4 8 12 8 12s8-8 8-12c0-4.42-3.58-8-8-8z"/></svg> الموقع والجهاز</div>
                <div class="detail"><span class="detail-lbl">الدولة</span><span class="detail-val">${d.region}</span></div>
                <div class="detail"><span class="detail-lbl">اللغة</span><span class="detail-val">${d.language}</span></div>
                <div class="detail"><span class="detail-lbl">الجهاز</span><span class="detail-val">${d.deviceType}</span></div>
                ${d.dmCount ? `<div class="detail"><span class="detail-lbl">المحادثات</span><span class="detail-val">${d.dmCount}</span></div>` : ''}
            </div>
            <div class="section">
                <div class="section-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> الخصوصية</div>
                <div class="detail"><span class="detail-lbl">موثق</span><span class="detail-val"><span class="badge ${d.verified?'badge-yes':'badge-no'}">${d.verified?'نعم':'لا'}</span></span></div>
                <div class="detail"><span class="detail-lbl">خاص</span><span class="detail-val"><span class="badge ${d.private?'badge-yes':'badge-no'}">${d.private?'نعم':'لا'}</span></span></div>
                <div class="detail"><span class="detail-lbl">المتابعين</span><span class="detail-val">${d.showFollowers}</span></div>
                <div class="detail"><span class="detail-lbl">الدويتو</span><span class="detail-val">${d.duet}</span></div>
                <div class="detail"><span class="detail-lbl">التعليقات</span><span class="detail-val">${d.comments}</span></div>
            </div>
        `;
        document.getElementById('result').innerHTML = html;
    }

    async function searchTikTok(){
        if(!captchaSolved) { showToast('يرجى إكمال التحقق الأمني أولاً'); return; }
        const q = document.getElementById('query').value.trim();
        if(!q) { showToast('الرجاء إدخال اسم المستخدم'); return; }
        
        toggleLoader(true);
        toggleResult(false);
        toggleError(false);
        
        try {
            const html = await fetchTikTokData(q);
            const data = parseProfile(html);
            renderProfile(data);
            toggleResult(true);
            showToast('تم جلب المعلومات بنجاح');
        } catch(e) {
            toggleError(true, e.message);
        } finally {
            toggleLoader(false);
        }
    }

    window.viewAvatar = function() { if(!avatarGlobal) return; document.getElementById('modalImage').src = avatarGlobal; document.getElementById('modal').style.display = 'flex'; };
    window.copyID = function(id) { navigator.clipboard?.writeText(id).then(() => showToast('تم نسخ ID ✓')); };
    window.downloadAvatar = async function() {
        if(!avatarGlobal) return;
        try {
            const r = await fetch(avatarGlobal); const b = await r.blob();
            const a = document.createElement('a'); a.href = URL.createObjectURL(b);
            a.download = `rio_avatar.jpg`; a.click(); URL.revokeObjectURL(a.href);
        } catch(e) { window.open(avatarGlobal); }
    };

    document.getElementById('query').addEventListener('keypress', e => { if(e.key === 'Enter') searchTikTok(); });
</script>
</body>
</html>
